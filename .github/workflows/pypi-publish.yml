name: Publish Helix-Adapter to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    name: Build and Publish Artifacts
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/helix-adapter
    permissions:
      id-token: write  # Mandated for PyPI Trusted Publishing OIDC handshake

    steps:
    - name: Checkout Code Baseline
      uses: actions/checkout@v4

    - name: Initialize Sterile Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Packaging Utilities
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Compile Distribution Wheels (PEP 517)
      run: python -m build

    - name: Verify Artifact Metadata Consistency
      run: twine check dist/*

    - name: Publish Payload to PyPI via Trusted Publisher
      uses: pypa/gh-action-pypi-publish@release/v1
