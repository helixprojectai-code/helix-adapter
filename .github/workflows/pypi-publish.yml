name: Publish Helix-Adapter to PyPI

on:
  push:
    tags: ['v*']
  release:
    types: [published]

jobs:
  deploy:
    name: Build and Publish Artifacts
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Baseline
      uses: actions/checkout@v4

    - name: Initialize Sterile Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Packaging Utilities
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Compile Distribution Wheels (PEP 517)
      run: python -m build

    - name: Verify Artifact Metadata Consistency
      run: twine check dist/*

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: twine upload dist/*
